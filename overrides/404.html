{% extends "main.html" %}

{% block content %}
<div class="md-typeset" style="text-align:center; padding:2.5rem 1rem 3.5rem;">

  <p style="font-size:.95rem; margin:.2rem 0;">
    This page isn't here. The address may be mistyped, or the page moved.

    Такой страницы нет — возможно, адрес набран с опечаткой или страница переехала.
  </p>
  <p>
    <a href="{{ config.site_url }}">Home</a>
    &nbsp;·&nbsp;
    <a href="{{ config.site_url }}protocol/">The Plan</a>
    &nbsp;·&nbsp;

</div>
{% endblock %}
