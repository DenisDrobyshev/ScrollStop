<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" role="img" aria-label="Five escalating steps of friction, from turning off notifications to keeping the phone out of the bedroom">
  <defs>
    <style>
      .lbl { font-family: Inter, "Segoe UI", system-ui, sans-serif; }
    </style>
  </defs>

  <!-- guide line rising left to right -->
  <line x1="40" y1="320" x2="720" y2="70" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 6" opacity="0.6"/>
  <polygon points="720,70 706,74 712,84" fill="#94a3b8" opacity="0.7"/>
  <text x="712" y="60" text-anchor="end" class="lbl" font-size="15" fill="#94a3b8">more friction →</text>

  <!-- Step 1 -->
  <g transform="translate(24,268)">
    <rect width="150" height="66" rx="13" fill="#60a5fa"/>
    <circle cx="30" cy="33" r="17" fill="#ffffff"/>
    <text x="30" y="39" text-anchor="middle" class="lbl" font-size="20" font-weight="700" fill="#2563eb">1</text>
    <!-- bell with slash -->
    <g transform="translate(96,15)" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 22 C6 12 10 8 16 8 C22 8 26 12 26 22 L29 26 L3 26 Z"/>
      <path d="M13 30 a3 3 0 0 0 6 0"/>
      <line x1="2" y1="4" x2="30" y2="32"/>
    </g>
  </g>

  <!-- Step 2 -->
  <g transform="translate(166,206)">
    <rect width="150" height="66" rx="13" fill="#3b82f6"/>
    <circle cx="30" cy="33" r="17" fill="#ffffff"/>
    <text x="30" y="39" text-anchor="middle" class="lbl" font-size="20" font-weight="700" fill="#2563eb">2</text>
    <!-- folder -->
    <g transform="translate(94,17)" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6 L13 6 L16 11 L29 11 L29 28 L3 28 Z"/>
    </g>
  </g>

  <!-- Step 3 -->
  <g transform="translate(308,144)">
    <rect width="150" height="66" rx="13" fill="#2563eb"/>
    <circle cx="30" cy="33" r="17" fill="#ffffff"/>
    <text x="30" y="39" text-anchor="middle" class="lbl" font-size="20" font-weight="700" fill="#2563eb">3</text>
    <!-- lock -->
    <g transform="translate(96,15)" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="14" width="24" height="17" rx="3"/>
      <path d="M9 14 v-4 a7 7 0 0 1 14 0 v4"/>
    </g>
  </g>

  <!-- Step 4 -->
  <g transform="translate(450,82)">
    <rect width="150" height="66" rx="13" fill="#1d4ed8"/>
    <circle cx="30" cy="33" r="17" fill="#ffffff"/>
    <text x="30" y="39" text-anchor="middle" class="lbl" font-size="20" font-weight="700" fill="#1d4ed8">4</text>
    <!-- clock -->
    <g transform="translate(96,15)" stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="16" cy="19" r="13"/>
      <path d="M16 12 v7 l5 3"/>
    </g>
  </g>

  <!-- Step 5 -->
  <g transform="translate(592,20)">
    <rect width="150" height="66" rx="13" fill="#1e40af"/>
    <circle cx="30" cy="33" r="17" fill="#ffffff"/>
    <text x="30" y="39" text-anchor="middle" class="lbl" font-size="20" font-weight="700" fill="#1e40af">5</text>
    <!-- moon -->
    <g transform="translate(98,16)" fill="#ffffff">
      <path d="M24 18 a12 12 0 1 1 -13 -13 a9 9 0 0 0 13 13 z"/>
    </g>
  </g>
</svg>
